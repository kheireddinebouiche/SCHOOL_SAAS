<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SaaS - Maintenance en cours</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@700;800;900&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <style>
        :root {
            --primary: #4361ee;
            --secondary: #4cc9f0;
            --bg-dark: #0f172a;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* Animated Background Blobs */
        .background-blobs {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            filter: blur(80px);
            opacity: 0.6;
        }

        .blob {
            position: absolute;
            width: 500px;
            height: 500px;
            border-radius: 50%;
            filter: blur(40px);
            animation: move 20s infinite alternate;
        }

        .blob-1 {
            background: rgba(67, 97, 238, 0.3);
            top: -10%;
            left: -10%;
            animation-duration: 25s;
        }

        .blob-2 {
            background: rgba(76, 201, 240, 0.2);
            bottom: -10%;
            right: -10%;
            animation-duration: 30s;
        }

        .blob-3 {
            background: rgba(247, 37, 133, 0.15);
            top: 40%;
            left: 30%;
            animation-duration: 20s;
        }

        @keyframes move {
            from { transform: translate(0, 0) scale(1); }
            to { transform: translate(100px, 50px) scale(1.1); }
        }

        /* Main Card */
        .card {
            background: var(--glass-bg);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid var(--glass-border);
            border-radius: 32px;
            padding: 4rem 3rem;
            max-width: 600px;
            width: 90%;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            position: relative;
            z-index: 1;
            animation: slideUp 1s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Icon Wrapper */
        .icon-wrapper {
            width: 100px;
            height: 100px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 2rem;
            border: 1px solid var(--glass-border);
            position: relative;
        }

        .icon-wrapper i {
            font-size: 3.5rem;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: pulse 3s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); filter: brightness(1); }
            50% { transform: scale(1.1); filter: brightness(1.3); }
            100% { transform: scale(1); filter: brightness(1); }
        }

        h1 {
            font-family: 'Outfit', sans-serif;
            font-weight: 900;
            font-size: 2.75rem;
            margin-bottom: 1rem;
            letter-spacing: -1px;
            background: linear-gradient(to bottom, #fff, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p {
            font-size: 1.15rem;
            color: var(--text-muted);
            line-height: 1.6;
            margin-bottom: 3rem;
            max-width: 450px;
            margin-left: auto;
            margin-right: auto;
        }

        /* Modern Countdown */
        .countdown-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 1rem;
            margin-bottom: 3rem;
        }

        .timer-unit {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 1.25rem 0.5rem;
            transition: transform 0.3s ease;
        }

        .timer-unit:hover {
            transform: translateY(-5px);
            background: rgba(255, 255, 255, 0.05);
            border-color: rgba(67, 97, 238, 0.3);
        }

        .timer-val {
            font-family: 'Outfit', sans-serif;
            font-size: 2rem;
            font-weight: 800;
            color: var(--secondary);
            display: block;
            margin-bottom: 0.25rem;
            text-shadow: 0 0 20px rgba(76, 201, 240, 0.3);
        }

        .timer-label {
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--text-muted);
            font-weight: 600;
        }

        /* Loader */
        .loader-dots {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 2rem;
        }

        .dot {
            width: 8px;
            height: 8px;
            background: var(--primary);
            border-radius: 50%;
            animation: dotBounce 1.5s infinite ease-in-out;
        }

        .dot:nth-child(2) { animation-delay: 0.2s; }
        .dot:nth-child(3) { animation-delay: 0.4s; }

        @keyframes dotBounce {
            0%, 80%, 100% { transform: scale(0.6); opacity: 0.3; }
            40% { transform: scale(1.2); opacity: 1; }
        }

        @media (max-width: 500px) {
            h1 { font-size: 2rem; }
            .countdown-grid { grid-template-columns: repeat(2, 1fr); }
            .card { padding: 3rem 1.5rem; }
        }
    </style>
</head>
<body>
    <div class="background-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <div class="card">
        <div class="icon-wrapper">
            <i class="ri-rocket-2-fill"></i>
        </div>
        <h1>Mise à jour</h1>
        <p>{{ message|default:"Nous préparons quelque chose d'exceptionnel pour vous. La plateforme sera de nouveau disponible très bientôt." }}</p>
        
        {% if end_time %}
        <div class="countdown-grid" id="timer">
            <div class="timer-unit">
                <span id="days" class="timer-val">00</span>
                <span class="timer-label">Jours</span>
            </div>
            <div class="timer-unit">
                <span id="hours" class="timer-val">00</span>
                <span class="timer-label">Heures</span>
            </div>
            <div class="timer-unit">
                <span id="minutes" class="timer-val">00</span>
                <span class="timer-label">Min</span>
            </div>
            <div class="timer-unit">
                <span id="seconds" class="timer-val">00</span>
                <span class="timer-label">Sec</span>
            </div>
        </div>
        {% endif %}

        <div class="loader-dots">
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
        </div>
    </div>

    {% if end_time %}
    <script>
        const targetDate = new Date("{{ end_time }}").getTime();

        function updateTimer() {
            const now = new Date().getTime();
            const distance = targetDate - now;

            if (distance < 0) {
                document.getElementById("timer").innerHTML = "<div style='grid-column: span 4; font-family: Outfit; font-weight: 700; color: #4361ee; font-size: 1.25rem;'>DÉPLOYEMENT EN COURS...</div>";
                return;
            }

            const days = Math.floor(distance / (1000 * 60 * 60 * 24));
            const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((distance % (1000 * 60)) / 1000);

            document.getElementById("days").innerText = days.toString().padStart(2, '0');
            document.getElementById("hours").innerText = hours.toString().padStart(2, '0');
            document.getElementById("minutes").innerText = minutes.toString().padStart(2, '0');
            document.getElementById("seconds").innerText = seconds.toString().padStart(2, '0');
        }

        setInterval(updateTimer, 1000);
        updateTimer();
    </script>
    {% endif %}
</body>
</html>
