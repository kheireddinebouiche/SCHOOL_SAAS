{% load static %}
<!-- ========== App Menu pour Dirigeants (Horizontal) ========== -->
<div class="app-menu navbar-menu">
    <!-- LOGO (If not in header, but usually in header for horizontal) -->
    <div class="navbar-brand-box">
        <!-- Logo handled in header.html usually -->
         <button type="button" class="btn btn-sm p-0 fs-20 header-item float-end btn-vertical-sm-hover" id="vertical-hover">
            <i class="ri-record-circle-line"></i>
        </button>
    </div>

    <div id="scrollbar">
        <div class="container-fluid">
            <div id="two-column-menu"></div>
            <ul class="navbar-nav" id="navbar-nav">
                <style>
                    /* Horizontal Menu Styles */
                    .navbar-menu {
                        background: #ffffff !important;
                        border-bottom: 1px solid #e2e8f0;
                        box-shadow: 0 1px 2px rgba(0,0,0,0.05);
                        padding: 0 1rem;
                        height: 55px; /* Adjust as needed */
                        display: flex;
                        align-items: center;
                    }

                    .navbar-nav {
                        display: flex;
                        flex-direction: row;
                        align-items: center;
                        gap: 0.5rem;
                        width: 100%;
                    }

                    .navbar-nav .nav-item {
                        position: relative;
                    }

                    .navbar-nav .nav-link {
                        font-weight: 500;
                        color: #475569 !important; /* Slate-600 */
                        padding: 0.5rem 1rem !important;
                        border-radius: 8px !important;
                        transition: all 0.2s ease !important;
                        white-space: nowrap;
                        display: flex;
                        align-items: center;
                    }

                    .navbar-nav .nav-link:hover {
                        color: #0f766e !important; /* Teal-700 */
                        background-color: #f1f5f9 !important; /* Slate-100 */
                    }

                    .navbar-nav .nav-link.active {
                        color: #0d9488 !important; /* Teal-600 */
                        background-color: #f0fdfa !important; /* Teal-50 */
                        font-weight: 600;
                    }
                    
                    /* Dropdown Menu overrides */
                    .menu-dropdown {
                        position: absolute;
                        top: 100%;
                        left: 0;
                        z-index: 1000;
                        min-width: 220px;
                        background: #fff;
                        border: 1px solid #e2e8f0;
                        border-radius: 8px;
                        box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
                        padding: 0.5rem 0;
                        display: none; /* Handled by JS or Hover */
                    }
                    
                    .nav-item:hover > .menu-dropdown,
                    .nav-item .collapse.show { /* If using Bootstrap collapse manually */
                        display: block;
                    }

                    .menu-dropdown .nav-link {
                        padding: 0.5rem 1rem !important;
                        margin: 0 !important;
                        border-radius: 0 !important;
                    }
                    
                    .menu-dropdown .nav-link:hover {
                         background-color: #f8fafc !important;
                    }
                    
                    /* Hide Sidebar Background overlay */
                    .sidebar-background { display: none !important; }
                    
                    /* Icons */
                    .nav-link i {
                        font-size: 1.1rem;
                        margin-right: 0.5rem;
                        vertical-align: middle;
                    }

                    .menu-title { display: none; } /* Hide titles in horizontal */

                </style>

                <!-- Accueil -->
                <li class="nav-item">
                    <a class="nav-link menu-link" href="/">
                        <i class="bx bx-home-alt"></i> <span>Tableau de Bord</span>
                    </a>
                </li>

                <!-- Gestion Budgétaire Dropdown -->
                <li class="nav-item dropdown">
                    <a class="nav-link menu-link dropdown-toggle {% if request.resolver_match.url_name in 'budget_campaign_list,budget_campaign_instituts,budget_campaign_matrix,budget_campaign_matrix_filtered,postes_budgetaires_list' %}active{% endif %}" 
                       href="#" id="navbarBudget" role="button" data-bs-toggle="dropdown" aria-expanded="false">
                        <i class="bx bx-wallet"></i> <span data-key="t-budget">Gestion Budgétaire</span>
                    </a>
                    <div class="menu-dropdown dropdown-menu" aria-labelledby="navbarBudget">
                         <a href="{% url 'associe_app:budget_campaign_list' %}" class="nav-link dropdown-item {% if request.resolver_match.url_name in 'budget_campaign_list,budget_campaign_instituts,budget_campaign_matrix,budget_campaign_matrix_filtered' %}active{% endif %}">
                            <i class="bx bx-calendar-event"></i> Campagnes
                        </a>
                        <a href="{% url 'associe_app:postes_budgetaires_list' %}" class="nav-link dropdown-item {% if request.resolver_match.url_name == 'postes_budgetaires_list' %}active{% endif %}">
                            <i class="bx bx-list-ol"></i> Postes Budgétaires
                        </a>
                    </div>
                </li>

                <!-- Plan Comptable Dropdown -->
                <li class="nav-item dropdown">
                    <a class="nav-link menu-link dropdown-toggle {% if request.resolver_match.url_name in 'global_payment_category_list,global_depenses_category_list' %}active{% endif %}" 
                       href="#" id="navbarCompta" role="button" data-bs-toggle="dropdown" aria-expanded="false">
                        <i class="bx bx-book-content"></i> <span data-key="t-compta">Plan Comptable</span>
                    </a>
                    <div class="menu-dropdown dropdown-menu" aria-labelledby="navbarCompta">
                        <a href="{% url 'associe_app:global_payment_type_list' %}" class="nav-link dropdown-item {% if request.resolver_match.url_name == 'global_payment_type_list' %}active{% endif %}">
                            <i class="bx bx-purchase-tag"></i> Types de Paiement
                        </a>
                        <a href="{% url 'associe_app:global_payment_category_list' %}" class="nav-link dropdown-item {% if request.resolver_match.url_name == 'global_payment_category_list' %}active{% endif %}">
                            <i class="bx bx-credit-card"></i> Modes de Paiement
                        </a>
                        <a href="{% url 'associe_app:global_depenses_category_list' %}" class="nav-link dropdown-item {% if request.resolver_match.url_name == 'global_depenses_category_list' %}active{% endif %}">
                            <i class="bx bx-receipt"></i> Catégories Dépenses
                        </a>
                    </div>
                </li>

                <!-- Administration Dropdown -->
                <li class="nav-item dropdown">
                    <a class="nav-link menu-link dropdown-toggle {% if request.resolver_match.url_name in 'tenant_data_list,configuration_structure,configuration_index' %}active{% endif %}" 
                       href="#" id="navbarAdmin" role="button" data-bs-toggle="dropdown" aria-expanded="false">
                        <i class="bx bx-cog"></i> <span data-key="t-admin">Administration</span>
                    </a>
                    <div class="menu-dropdown dropdown-menu" aria-labelledby="navbarAdmin">
                        <a href="{% url 'associe_app:tenant_data_list' %}" class="nav-link dropdown-item {% if request.resolver_match.url_name == 'tenant_data_list' %}active{% endif %}">
                            <i class="bx bx-building"></i> Gestion des Instituts
                        </a>
                        <a href="{% url 'associe_app:configuration_structure' %}" class="nav-link dropdown-item {% if request.resolver_match.url_name == 'configuration_structure' %}active{% endif %}">
                            <i class="bx bx-wrench"></i> Init. Structure
                        </a>
                    </div>
                </li>

                <!-- Reports -->
                <li class="nav-item">
                     <a class="nav-link menu-link {% if request.resolver_match.url_name == 'crm_statistics' %}active{% endif %}" href="{% url 'associe_app:crm_statistics' %}">
                        <i class="bx bx-pie-chart-alt-2"></i> <span>Rapports & Stats</span>
                    </a>
                </li>

            </ul>
        </div>
    </div>
    <div class="sidebar-background"></div>
</div>
