<!-- Modal Détails de la dérogation -->
<div class="modal fade" id="detailsDerogationModal" tabindex="-1" aria-labelledby="detailsDerogationModalLabel" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered modal-lg">
    <div class="modal-content rounded-4 shadow-lg border-0">
      <div class="modal-header border-0 bg-primary bg-opacity-10 px-4 py-3">
        <div class="d-flex align-items-center">
          <div class="modal-icon bg-white rounded-3 p-3 me-3 shadow-sm">
            <i class="ri-file-info-line text-primary fs-4"></i>
          </div>
          <div>
            <h5 class="modal-title fw-bold text-primary mb-1" id="detailsDerogationModalLabel">
              Détails de la demande
            </h5>
            <p class="text-muted small mb-0">Dérogation ID: <span id="display-id">-</span></p>
          </div>
        </div>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body p-4">
        <div class="row g-4">
          <div class="col-md-6">
            <div class="p-3 bg-light rounded-3 h-100">
              <label class="text-muted small fw-bold text-uppercase mb-2 d-block">Étudiant</label>
              <h6 class="mb-1" id="detail-demandeur">-</h6>
              <span class="badge bg-soft-info" id="detail-type_formation">-</span>
            </div>
          </div>
          <div class="col-md-6">
            <div class="p-3 bg-light rounded-3 h-100">
              <label class="text-muted small fw-bold text-uppercase mb-2 d-block">Date de demande</label>
              <h6 class="mb-1" id="detail-date-demande">-</h6>
              <div id="detail-statut"></div>
            </div>
          </div>
          <div class="col-12">
            <div class="p-3 bg-light rounded-3">
              <label class="text-muted small fw-bold text-uppercase mb-2 d-block">Motif de la demande</label>
              <p class="mb-0 fw-medium" id="detail-motif">-</p>
            </div>
          </div>
          <div class="col-12">
            <div class="p-3 bg-white border rounded-3 text-muted" style="min-height: 80px;" id="detail-description">
              -
            </div>
          </div>
        </div>
      </div>
      <div class="modal-footer border-0 px-4 py-3 bg-light bg-opacity-50">
        <button type="button" class="btn btn-soft-secondary rounded-pill px-4" data-bs-dismiss="modal">Fermer</button>
        <button type="button" class="btn btn-outline-info rounded-pill px-4" id="voirDossiersManquantsBtn">
          <i class="ri-folder-info-line me-1"></i> Dossiers Manquants
        </button>
        <button type="button" class="btn btn-primary rounded-pill px-4" id="traiteDerogBtn">
          <i class="ri-edit-line me-1"></i> Traiter la demande
        </button>
      </div>
    </div>
  </div>
</div>

<!-- Modal Traitement -->
<div class="modal fade" id="traiterDerogationModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content rounded-4 shadow-lg border-0 overflow-hidden">
      <div class="modal-header border-0 bg-warning bg-opacity-10 px-4 py-3">
        <h5 class="modal-title fw-bold text-warning">Désision de traitement</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body p-4 text-center">
        <div class="avatar-lg mx-auto mb-4">
          <div class="avatar-title bg-warning bg-opacity-10 text-warning display-4 rounded-circle">
            <i class="ri-bookmark-3-line"></i>
          </div>
        </div>
        <p class="text-muted mb-4">Veuillez prendre une décision concernant cette demande de dérogation.</p>
        <div class="row g-3 text-start">
          <div class="col-12">
            <label class="form-label fw-semibold">Action</label>
            <select id="decision_derogation" class="form-select rounded-3 border-light py-2">
              <option value="">Sélectionner...</option>
              <option value="acceptee">Accepter la demande</option>
              <option value="rejetee">Rejeter la demande</option>
            </select>
          </div>
          <div class="col-12">
            <label class="form-label fw-semibold">Note d'observation</label>
            <textarea id="commentaire_traitement" class="form-control rounded-3 border-light" rows="3" placeholder="Facultatif..."></textarea>
          </div>
        </div>
      </div>
      <div class="modal-footer border-0 bg-light p-3">
        <button type="button" class="btn btn-light rounded-pill px-4" data-bs-dismiss="modal">Annuler</button>
        <button type="button" class="btn btn-warning rounded-pill px-4" id="btnConfirmerTraitement">
          Confirmer la décision
        </button>
      </div>
    </div>
  </div>
</div>

<!-- Modal Supprimer -->
<div class="modal fade deleteModal shadow-lg" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered modal-sm">
    <div class="modal-content rounded-4 border-0">
      <div class="modal-body p-4 text-center">
        <div class="text-danger mb-3">
          <i class="ri-error-warning-line display-4"></i>
        </div>
        <h5 class="fw-bold">Suppression</h5>
        <p class="text-muted">Voulez-vous vraiment supprimer cet enregistrement ?</p>
        <div class="d-flex gap-2 justify-content-center mt-4">
          <button type="button" class="btn btn-light rounded-pill px-4" data-bs-dismiss="modal">Non</button>
          <button type="button" class="btn btn-danger rounded-pill px-4" id="confirmDeleteBtn">Oui, supprimer</button>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Modal Dossiers Manquants -->
<div class="modal fade" id="dossiersManquantsModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content rounded-4 border-0 shadow-lg">
      <div class="modal-header border-0 bg-info bg-opacity-10 px-4 py-3">
        <h6 class="modal-title fw-bold text-info"><i class="ri-file-warning-line me-2"></i>Dossiers Manquants</h6>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body p-4">
        <div id="listeDossiersManquants">
          <!-- Dynamically loaded -->
        </div>
      </div>
    </div>
  </div>
</div>
