
<!-- Modal Nouveau Prospect -->
<div class="modal fade" id="newProspectModal" tabindex="-1" aria-hidden="true" style="z-index: 1060;">
    <div class="modal-dialog modal-dialog-centered modal-md">
        <div class="modal-content border-0 shadow-lg" style="border-radius: 1rem; background: rgba(255,255,255,0.98); backdrop-filter: blur(12px); overflow: hidden;">

            <!-- Header -->
            <div class="modal-header border-0 px-4 py-3" style="background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);">
                <div class="d-flex align-items-center">
                    <div class="bg-white bg-opacity-20 rounded-3 p-2 me-3">
                        <i class="ri-user-add-line text-white fs-4"></i>
                    </div>
                    <div>
                        <h5 class="modal-title fw-bold text-white mb-0">Ajouter un Prospect</h5>
                        <small class="text-white text-opacity-75">Nouveau prospect entreprise</small>
                    </div>
                </div>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>

            <!-- Body -->
            <div class="modal-body p-4">
                <form id="quickProspectForm">
                    <input type="hidden" name="type_prospect" value="entreprise">

                    <!-- Section Entreprise -->
                    <div class="mb-4" id="entrepriseFields">
                        <div class="d-flex align-items-center mb-3">
                            <div class="bg-info bg-opacity-10 rounded-2 p-1 me-2">
                                <i class="ri-building-line text-info small"></i>
                            </div>
                            <span class="fw-bold text-muted small text-uppercase" style="letter-spacing: 0.05em;">Informations de l'Entreprise</span>
                        </div>
                        <div class="form-floating mb-3">
                            <input type="text" class="form-control bg-light border-0 shadow-none" id="prospectEntreprise" name="entreprise" required placeholder="Désignation de l'entreprise" style="border-radius: 12px;">
                            <label for="prospectEntreprise" class="text-muted"><i class="ri-building-line me-1"></i>Désignation <span class="text-danger">*</span></label>
                        </div>
                        <div class="row g-3">
                            <div class="col-md-6">
                                <div class="form-floating">
                                    <input type="tel" class="form-control bg-light border-0 shadow-none" id="prospectTelEts" name="telephone_entreprise" placeholder="05XXXXXXXX" style="border-radius: 12px;">
                                    <label for="prospectTelEts" class="text-muted"><i class="ri-phone-line me-1"></i>Téléphone Entreprise</label>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="form-floating">
                                    <input type="email" class="form-control bg-light border-0 shadow-none" id="prospectEmailEts" name="email_entreprise" placeholder="contact@entreprise.com" style="border-radius: 12px;">
                                    <label for="prospectEmailEts" class="text-muted"><i class="ri-mail-line me-1"></i>Email Entreprise</label>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Section Contact -->
                    <div class="mb-4">
                        <div class="d-flex align-items-center mb-3">
                            <div class="bg-primary bg-opacity-10 rounded-2 p-1 me-2">
                                <i class="ri-user-line text-primary small"></i>
                            </div>
                            <span class="fw-bold text-muted small text-uppercase" style="letter-spacing: 0.05em;">Contact Principal (Optionnel)</span>
                        </div>
                        <div class="row g-3 mb-3">
                            <div class="col-md-6">
                                <div class="form-floating">
                                    <input type="text" class="form-control bg-light border-0 shadow-none" id="prospectNom" name="nom" placeholder="Nom du contact" style="border-radius: 12px;">
                                    <label for="prospectNom" class="text-muted">Nom</label>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="form-floating">
                                    <input type="text" class="form-control bg-light border-0 shadow-none" id="prospectPrenom" name="prenom" placeholder="Prénom du contact" style="border-radius: 12px;">
                                    <label for="prospectPrenom" class="text-muted">Prénom</label>
                                </div>
                            </div>
                        </div>
                        <div class="form-floating mb-3">
                            <input type="text" class="form-control bg-light border-0 shadow-none" id="prospectPoste" name="poste" placeholder="Poste occupé" style="border-radius: 12px;">
                            <label for="prospectPoste" class="text-muted"><i class="ri-briefcase-line me-1"></i>Poste du contact</label>
                        </div>
                    </div>

                    <!-- Section Coordonnées -->
                    <div class="mb-3">
                        <div class="d-flex align-items-center mb-3">
                            <div class="bg-success bg-opacity-10 rounded-2 p-1 me-2">
                                <i class="ri-phone-line text-success small"></i>
                            </div>
                            <span class="fw-bold text-muted small text-uppercase" style="letter-spacing: 0.05em;">Coordonnées (Optionnel)</span>
                        </div>
                        <div class="row g-3">
                            <div class="col-md-6">
                                <div class="form-floating">
                                    <input type="email" class="form-control bg-light border-0 shadow-none" id="prospectEmail" name="email" placeholder="exemple@mail.com" style="border-radius: 12px;">
                                    <label for="prospectEmail" class="text-muted"><i class="ri-mail-line me-1"></i>Email</label>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="form-floating">
                                    <input type="tel" class="form-control bg-light border-0 shadow-none" id="prospectTelephone" name="telephone" placeholder="05XXXXXXXX" style="border-radius: 12px;">
                                    <label for="prospectTelephone" class="text-muted"><i class="ri-phone-line me-1"></i>Téléphone</label>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Alerte erreur -->
                    <div id="prospectError" class="alert alert-danger d-none mt-3 rounded-3 border-0 fs-13">
                        <i class="ri-error-warning-fill me-1 align-middle"></i> <span id="errorText"></span>
                    </div>

                </form>
            </div>

            <!-- Footer -->
            <div class="modal-footer border-0 px-4 py-3 bg-light" style="border-bottom-left-radius: 1.25rem; border-bottom-right-radius: 1.25rem;">
                <button type="button" class="btn btn-light px-4 py-2 shadow-sm fw-medium" data-bs-dismiss="modal" style="border-radius: 12px;">Annuler</button>
                <button type="button" class="btn btn-primary px-4 py-2 shadow-sm fw-medium" id="saveProspectBtn" onclick="submitNewProspect()" style="border-radius: 12px;">
                    <i class="ri-save-line me-1"></i> Enregistrer
                </button>
            </div>

        </div>
    </div>
</div>
