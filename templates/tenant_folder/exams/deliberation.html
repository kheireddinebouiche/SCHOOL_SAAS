{% extends 'tenant_folder/base.html' %}
{% load static %}
{% block title %} Examens - Délibération des PV {% endblock title %}

{% block content %}
<style>
  @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap');

  :root {
    --glass-bg: rgba(255, 255, 255, 0.75);
    --glass-border: rgba(255, 255, 255, 0.45);
    --glass-shadow: 0 10px 35px 0 rgba(31, 38, 135, 0.05);
    --primary-gradient: linear-gradient(135deg, #3b7ddd 0%, #4b91f1 100%);
  }

  .main-content, .modal-content, .popover, .alertify {
    font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif !important;
  }

  .glass-card {
    background: var(--glass-bg);
    backdrop-filter: blur(14px) saturate(120%);
    -webkit-backdrop-filter: blur(14px) saturate(120%);
    border: 1px solid var(--glass-border);
    box-shadow: var(--glass-shadow);
    border-radius: 16px;
    transition: all 0.35s cubic-bezier(0.2, 0.8, 0.2, 1);
  }

  .glass-card:hover {
    transform: translateY(-4px);
    box-shadow: 0 16px 45px 0 rgba(31, 38, 135, 0.08);
  }

  /* Premium Stat Cards */
  .stat-card {
    border-radius: 16px;
    border: 1px solid var(--glass-border);
    background: var(--glass-bg);
    backdrop-filter: blur(14px) saturate(120%);
    -webkit-backdrop-filter: blur(14px) saturate(120%);
    box-shadow: var(--glass-shadow);
    transition: all 0.35s cubic-bezier(0.2, 0.8, 0.2, 1);
  }
  .stat-card:hover {
    transform: translateY(-4px);
    box-shadow: 0 16px 30px rgba(0, 0, 0, 0.04);
  }

  /* Search box modernization */
  .search-box {
    position: relative;
    width: 240px;
  }
  .search-box .search-icon {
    position: absolute;
    right: 15px;
    top: 50%;
    transform: translateY(-50%);
    color: #6c757d;
  }
  .search-box input, .search-box select {
    padding-right: 40px;
    background: rgba(255, 255, 255, 0.5);
    border: 1px solid rgba(0, 0, 0, 0.05);
    transition: all 0.25s ease-in-out;
  }
  .search-box input:focus, .search-box select:focus {
    background: #fff;
    box-shadow: 0 0 0 4px rgba(59, 125, 221, 0.12) !important;
  }

  .badge-soft-primary { background-color: rgba(59, 125, 221, 0.08); color: #3b7ddd; border: 1px solid rgba(59, 125, 221, 0.15); }
  .badge-soft-success { background-color: rgba(28, 187, 140, 0.08); color: #1cbb8c; border: 1px solid rgba(28, 187, 140, 0.15); }
  .badge-soft-info { background-color: rgba(23, 162, 184, 0.08); color: #17a2b8; border: 1px solid rgba(23, 162, 184, 0.15); }
  .badge-soft-warning { background-color: rgba(252, 185, 44, 0.08); color: #fcb92c; border: 1px solid rgba(252, 185, 44, 0.15); }
  .badge-soft-danger { background-color: rgba(220, 53, 69, 0.08); color: #dc3545; border: 1px solid rgba(220, 53, 69, 0.15); }
  .badge-soft-secondary { background-color: rgba(108, 117, 125, 0.08); color: #6c757d; border: 1px solid rgba(108, 117, 125, 0.15); }

  /* Dropdown customization */
  .dropdown-menu { border-radius: 12px; border: 1px solid rgba(0,0,0,0.08); box-shadow: 0 10px 30px rgba(0,0,0,0.08); z-index: 1060 !important; }
  .btn-ghost-secondary {
    color: #495057;
    background: transparent;
    border: none;
    transition: all 0.25s ease;
  }
  .btn-ghost-secondary:hover {
    background: rgba(0, 0, 0, 0.05);
    color: #212529;
  }
  .btn-icon {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 32px;
    height: 32px;
    padding: 0;
  }

  .form-control:focus,
  .form-select:focus {
    box-shadow: 0 0 0 4px rgba(59, 125, 221, 0.12) !important;
    border-color: #3b7ddd !important;
  }

  .form-control, .form-select {
    transition: all 0.3s ease;
  }
</style>

<div class="main-content">
  <div class="page-content bg-light">
    <div class="container-fluid">
      {% include 'tenant_folder/exams/examens_navbar.html' %}

      <div class="row">
        <div class="col-lg-12">
          <div class="glass-card mb-4 overflow-hidden">
            <div class="card-body p-3 border-bottom border-white border-opacity-20">
              <div class="d-flex flex-wrap align-items-center justify-content-between gap-3">
                <div class="d-flex flex-wrap align-items-center gap-3">
                  <div class="search-box">
                    <input type="text" placeholder="Rechercher..." id="searchInput" class="form-control rounded-pill border-0 shadow-sm"/>
                    <i class="ri-search-line search-icon"></i>
                  </div>
                  <div class="position-relative search-box">
                    <select id="yearFilter" class="form-select rounded-pill border-0 shadow-sm bg-white ps-3">
                      <option value="">Toutes les années</option>
                      <!-- Options will be populated by JavaScript -->
                    </select>
                  </div>
                </div>
              </div>
            </div>

            <div class="card-body p-3">
              <div class="row" id="listItem">
                <div class="col-12">
                  <div class="d-flex flex-column align-items-center justify-content-center py-5">
                    <i class="bx bx-loader bx-spin bx-lg text-primary mb-3"></i>
                    <p class="text-muted mb-0">Chargement des délibérations...</p>
                  </div>
                </div>
              </div>

              <!-- Pagination -->
              <nav aria-label="Délibérations pagination" class="mt-4">
                <ul class="pagination justify-content-center" id="pagination">
                  <!-- Pagination will be populated by JavaScript -->
                </ul>
              </nav>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
  $(document).ready(function(){
    let deliberationsData = [];
    let currentPage = 1;
    const itemsPerPage = 10;

    function getStatusClass(deliberation) {
      return 'badge-soft-danger';
    }

    function getStatusText(deliberation) {
      return 'Clôturée';
    }

    function renderTable(data) {
      let row = "";
      if (data.length > 0) {
        $.each(data, function(index, i) {
          row += '<div class="col-xl-4 col-lg-6 col-md-12 mb-4">';
          row += '    <div class="glass-card h-100 p-0">';
          row += '        <div class="p-4">';
          row += '            <div class="d-flex justify-content-between align-items-start mb-3">';
          row += '                <div class="d-flex align-items-center overflow-hidden">';
          row += '                    <div class="avatar-sm bg-primary bg-opacity-10 text-primary rounded-circle d-flex align-items-center justify-content-center me-3" style="width:36px; height:36px; min-width:36px;">';
          row += '                        <i class="ri-file-list-line fs-16"></i>';
          row += '                    </div>';
          row += '                    <div class="overflow-hidden">';
          row += '                        <h6 class="mb-0 fw-bold text-dark text-truncate" style="max-width: 200px;" title="'+i.code+'"><a href="javascript:void(0)" class="text-dark">'+i.code+'</a></h6>';
          row += '                        <span class="text-muted small text-truncate d-block"><i class="ri-information-line me-1"></i>'+i.label+'</span>';
          row += '                    </div>';
          row += '                </div>';
          row += '                <div class="dropdown">';
          row += '                    <button class="btn btn-ghost-secondary btn-icon btn-sm rounded-circle shadow-none" type="button" data-bs-toggle="dropdown" aria-expanded="false">';
          row += '                        <i class="ri-more-2-fill fs-5"></i>';
          row += '                    </button>';
          row += '                    <ul class="dropdown-menu dropdown-menu-end shadow-lg border-0 p-2">';
          row += '                        <li><a href="javascript:void(0)" onclick="viewSessionDetails('+i.id+')" class="dropdown-item d-flex align-items-center px-3 py-2 rounded-2"><i class="ri-eye-line text-primary me-2"></i> Consulter</a></li>';
          row += '                        <li><a href="javascript:void(0)" class="dropdown-item d-flex align-items-center px-3 py-2 rounded-2"><i class="ri-printer-line text-warning me-2"></i> Imprimer</a></li>';
          row += '                    </ul>';
          row += '                </div>';
          row += '            </div>';
          row += '            <div class="row g-2 mb-3">';
          row += '                <div class="col-6">';
          row += '                    <div class="p-2 bg-light bg-opacity-50 rounded-3 text-center">';
          row += '                        <span class="d-block text-muted small text-uppercase fw-bold mb-1" style="font-size: 0.65rem;">Début</span>';
          row += '                        <span class="fw-bold text-dark small">'+formatDate(i.date_debut.split('T')[0])+'</span>';
          row += '                    </div>';
          row += '                </div>';
          row += '                <div class="col-6">';
          row += '                    <div class="p-2 bg-light bg-opacity-50 rounded-3 text-center">';
          row += '                        <span class="d-block text-muted small text-uppercase fw-bold mb-1" style="font-size: 0.65rem;">Fin</span>';
          row += '                        <span class="fw-bold text-primary small">'+formatDate(i.date_fin.split('T')[0])+'</span>';
          row += '                    </div>';
          row += '                </div>';
          row += '            </div>';
          row += '            <div class="space-y-2">';
          row += '                <div class="d-flex justify-content-between align-items-center">';
          row += '                    <span class="text-muted small">Statut</span>';
          row += '                    <span class="badge '+getStatusClass(i)+'"><i class="ri-checkbox-circle-fill me-1"></i>'+getStatusText(i)+'</span>';
          row += '                </div>';
          row += '            </div>';
          row += '        </div>';
          row += '        <div class="bg-light bg-opacity-50 p-3 d-flex align-items-center justify-content-between border-top border-white border-opacity-20">';
          row += '            <div class="d-flex align-items-center">';
          row += '                <i class="ri-time-line text-muted me-2" style="font-size: 14px;"></i>';
          row += '                <span class="text-muted small">PV Session</span>';
          row += '            </div>';
          row += '            <div>';
          row += '                <button type="button" class="btn btn-outline-primary btn-sm rounded-pill px-3" onclick="viewSessionDetails('+i.id+')">Voir détails</button>';
          row += '            </div>';
          row += '        </div>';
          row += '    </div>';
          row += '</div>';
        });
      } else {
        row = '<div class="col-12"><div class="text-center py-5"><i class="ri-file-list-line display-4 text-muted"></i><h5 class="mt-3 text-muted">Aucune délibération disponible</h5><p class="text-muted">Aucune délibération trouvée avec les critères sélectionnés</p></div></div>';
      }

      $('#listItem').html(row);
    }

    function formatDate(dateString) {
      const options = { year: 'numeric', month: 'short', day: 'numeric' };
      return new Date(dateString).toLocaleDateString('fr-FR', options);
    }

    function extractYears(data) {
      const years = new Set();
      data.forEach(item => {
        if (item.date_debut) {
          const year = new Date(item.date_debut.split('T')[0]).getFullYear();
          years.add(year);
        }
      });
      return Array.from(years).sort((a, b) => b - a); // Sort in descending order
    }

    function populateYearFilter(data) {
      const years = extractYears(data);
      const yearFilter = $('#yearFilter');
      yearFilter.empty();
      yearFilter.append('<option value="">Toutes les années</option>');
      years.forEach(year => {
        yearFilter.append(`<option value="${year}">${year}</option>`);
      });
    }

    function loadDeliberations() {
      $.ajax({
        url : "{% url 't_exam:ApiLoadDeliberationPv' %}",
        type : 'GET',
        dataType : 'JSON',
        success : function(data) {
          deliberationsData = data;
          populateYearFilter(data);
          renderTable(data);
          renderPagination();
        },
        error: function() {
          $('#listItem').html("<div class='col-12'><div class='text-center py-5 text-danger'><i class='ri-error-warning-line me-2 ri-xl'></i><p>Erreur de chargement des données</p></div></div>");
        }
      });
    }

    function renderPagination() {
      const totalPages = Math.ceil(deliberationsData.length / itemsPerPage);
      let paginationHtml = '';

      if (totalPages <= 1) {
        $('#pagination').html('');
        return;
      }

      // Previous button
      paginationHtml += '<li class="page-item '+(currentPage === 1 ? 'disabled' : '')+'">';
      paginationHtml += '<a class="page-link" href="#" data-page="'+(currentPage-1)+'" aria-label="Previous">';
      paginationHtml += '<i class="ri-arrow-left-s-line"></i>';
      paginationHtml += '</a></li>';

      // Page numbers
      for (let i = 1; i <= totalPages; i++) {
        paginationHtml += '<li class="page-item '+(i === currentPage ? 'active' : '')+'">';
        paginationHtml += '<a class="page-link" href="#" data-page="'+i+'">'+i+'</a>';
        paginationHtml += '</li>';
      }

      // Next button
      paginationHtml += '<li class="page-item '+(currentPage === totalPages ? 'disabled' : '')+'">';
      paginationHtml += '<a class="page-link" href="#" data-page="'+(currentPage+1)+'" aria-label="Next">';
      paginationHtml += '<i class="ri-arrow-right-s-line"></i>';
      paginationHtml += '</a></li>';

      $('#pagination').html(paginationHtml);
    }

    function filterDeliberations() {
      var searchTerm = $('#searchInput').val().toLowerCase();
      var selectedYear = $('#yearFilter').val();

      var filteredData = deliberationsData.filter(deliberation => {
        // Check search term
        var matchesSearch = searchTerm === '' ||
          deliberation.code.toLowerCase().includes(searchTerm) ||
          deliberation.label.toLowerCase().includes(searchTerm);

        // Check year filter
        var matchesYear = selectedYear === '' || !deliberation.date_debut;
        if (deliberation.date_debut) {
          const deliberationYear = new Date(deliberation.date_debut.split('T')[0]).getFullYear().toString();
          matchesYear = selectedYear === '' || deliberationYear === selectedYear;
        }

        return matchesSearch && matchesYear;
      });

      renderTable(filteredData);
    }

    // Load initial data
    loadDeliberations();

    // Search functionality
    $('#searchInput').on('input', function() {
      filterDeliberations();
    });

    // Year filter
    $('#yearFilter').on('change', function() {
      filterDeliberations();
    });

    // Pagination
    $(document).on('click', '#pagination .page-link', function(e) {
      e.preventDefault();
      const page = parseInt($(this).data('page'));
      if (!isNaN(page)) {
        currentPage = page;
        renderPagination();
      }
    });

    // Function to view session details
    window.viewSessionDetails = function(sessionId) {
      window.location.href = "{% url 't_exam:PageDeliberationResult' pk=0 %}".replace('0', sessionId);
    };
  });
</script>
{% endblock content %}
