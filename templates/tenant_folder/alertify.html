<script>
    alertify.set('notifier','position','top-right');
    alertify.set('notifier','delay', 12); // durée d’affichage augmentée à 12 secondes

    // Override global alertify methods to use our modern showAlert
    const originalAlertify = {
        success: alertify.success,
        error: alertify.error,
        warning: alertify.warning,
        message: alertify.message,
        notify: alertify.notify
    };

    alertify.success = function(msg) { return showAlert('success', msg); };
    alertify.error = function(msg) { return showAlert('error', msg); };
    alertify.warning = function(msg) { return showAlert('warning', msg); };
    alertify.message = function(msg) { return showAlert('message', msg); };
    alertify.notify = function(msg, type) { return showAlert(type || 'message', msg); };

    /**
     * Modernized Alertify Notification with Glassmorphism and Icons
     * @param {string} type - 'success', 'error', 'warning', 'message'
     * @param {string} message - The message to display
     */
    function showAlert(type, message) {
        // Map types to icons and colors
        const config = {
            success: { icon: 'ri-checkbox-circle-fill', color: '#0ab39c' },
            error: { icon: 'ri-error-warning-fill', color: '#f06548' },
            warning: { icon: 'ri-alert-fill', color: '#f7b84b' },
            message: { icon: 'ri-information-fill', color: '#299cdb' }
        };

        const typeConfig = config[type] || config.message;
        
        // Construct HTML content with icon
        const content = `
            <div class="modern-alert-content d-flex align-items-center">
                <div class="modern-alert-icon me-3">
                    <i class="${typeConfig.icon}"></i>
                </div>
                <div class="modern-alert-text">
                    ${message}
                </div>
            </div>
        `;

        // Create the notification Alertify using original methods to avoid recursion
        const originalMethod = originalAlertify[type] || originalAlertify.message;
        var notification = originalMethod.call(alertify, content);

        // Wait for render to apply specific styling and progress bar
        setTimeout(function() {
            var allMessages = document.querySelectorAll('.alertify-notifier .ajs-message');
            var el = allMessages[allMessages.length - 1];
            
            if (el) {
                // Apply type-specific class for CSS styling
                el.classList.add('modern-alert', 'modern-alert-' + type);
                
                // Add the progress bar
                var progressBar = document.createElement('div');
                progressBar.className = 'alertify-progress-bar';
                progressBar.style.backgroundColor = typeConfig.color;
                el.appendChild(progressBar);

                // Start animation matching Alertify delay
                progressBar.style.animation = 'progressbar 12s linear forwards';
            }
        }, 10);
        
        return notification;
    }

    {% for flashmeg in messages %}
        {% if 'success' in flashmeg.tags %}
            showAlert('success', '{{ flashmeg.message|escapejs }}');
        {% elif 'error' in flashmeg.tags %}
            showAlert('error', '{{ flashmeg.message|escapejs }}');
        {% elif 'warning' in flashmeg.tags %}
            showAlert('warning', '{{ flashmeg.message|escapejs }}');
        {% else %}
            showAlert('message', '{{ flashmeg.message|escapejs }}');
        {% endif %}
    {% endfor %}
</script>
