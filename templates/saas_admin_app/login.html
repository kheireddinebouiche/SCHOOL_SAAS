{% load static %}
<!DOCTYPE html>
<html lang="fr" class="bg-light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SaaS Command Center - Connexion</title>
    
    <!-- Google Font - Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Remix Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/remixicon/3.5.0/remixicon.min.css"/>
    
    <!-- Bootstrap CSS -->
    <link href="{% static 'design/assets/css/bootstrap.min.css' %}" rel="stylesheet" type="text/css" />
    
    <style>
        :root {
            --primary-color: #4361ee;
            --primary-hover: #3a56d4;
            --body-bg-start: #e0eafc;
            --body-bg-end: #cfdef3;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, var(--body-bg-start) 0%, var(--body-bg-end) 100%);
            background-attachment: fixed;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-card {
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.5);
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.07);
            width: 100%;
            max-width: 420px;
            padding: 2.5rem;
            transition: transform 0.3s ease;
        }
        
        .login-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 40px -4px rgba(31, 38, 135, 0.12);
        }

        .icon-box {
            width: 60px;
            height: 60px;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            background: linear-gradient(135deg, rgba(67, 97, 238, 0.15), rgba(67, 97, 238, 0.05));
            border: 1px solid rgba(67, 97, 238, 0.1);
            color: var(--primary-color);
            margin: 0 auto 1.5rem;
            box-shadow: inset 0 2px 4px rgba(255,255,255,0.5);
        }

        .form-control {
            border-radius: 12px;
            padding: 0.75rem 1rem;
            border: 1px solid rgba(255, 255, 255, 0.6);
            background-color: rgba(255, 255, 255, 0.8);
            transition: all 0.2s;
        }

        .form-control:focus {
            box-shadow: 0 0 0 4px rgba(67, 97, 238, 0.1);
            border-color: var(--primary-color);
            background-color: #fff;
        }

        .btn-primary {
            background-color: var(--primary-color);
            border-color: var(--primary-color);
            border-radius: 12px;
            padding: 0.75rem 1.5rem;
            font-weight: 600;
            transition: all 0.2s;
        }

        .btn-primary:hover {
            background-color: var(--primary-hover);
            border-color: var(--primary-hover);
            transform: translateY(-2px);
            box-shadow: 0 4px 10px rgba(67, 97, 238, 0.3);
        }

        /* Utility overrides */
        .fs-14 { font-size: 14px; }
    </style>
</head>
<body>

    <div class="login-card">
        <div class="text-center mb-4">
            <div class="icon-box">
                <i class="ri-shield-keyhole-line"></i>
            </div>
            <h4 class="fw-bold text-dark mb-1">Accès Restreint</h4>
            <p class="text-muted fs-14">Connectez-vous pour accéder au SaaS Command Center.</p>
        </div>

        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-danger py-2 fs-14 rounded-3 border-0 bg-danger-subtle text-danger" role="alert">
                    <i class="ri-error-warning-line me-1 align-middle"></i> {{ message }}
                </div>
            {% endfor %}
        {% endif %}

        <form method="POST" action="{% url 'saas_admin_app:saas_login' %}">
            {% csrf_token %}
            <div class="mb-3">
                <label for="email" class="form-label fw-medium text-dark fs-14">Email administrateur</label>
                <div class="position-relative">
                    <input type="text" class="form-control ps-5" id="email" name="email" placeholder="admin@insim360.com" required>
                    <i class="ri-mail-line position-absolute top-50 start-0 translate-middle-y ms-3 text-muted"></i>
                </div>
            </div>
            
            <div class="mb-4">
                <label for="password" class="form-label fw-medium text-dark fs-14">Mot de passe</label>
                <div class="position-relative">
                    <input type="password" class="form-control ps-5" id="password" name="password" placeholder="Mot de passe" required>
                    <i class="ri-lock-line position-absolute top-50 start-0 translate-middle-y ms-3 text-muted"></i>
                </div>
            </div>

            <div class="d-grid mb-3">
                <button type="submit" class="btn btn-primary d-flex justify-content-center align-items-center gap-2">
                    Se connecter <i class="ri-login-circle-line pb-1"></i>
                </button>
            </div>
            
            <div class="text-center">
                <a href="/" class="text-muted text-decoration-none fs-14 mt-2 d-inline-block">
                    <i class="ri-arrow-left-line align-middle"></i> Retour au portail
                </a>
            </div>
        </form>
    </div>

</body>
</html>
