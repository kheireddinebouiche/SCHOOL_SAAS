{% load static %}
<!-- Top Header Bar -->
<header class="saas-top-header">
    <div class="container-fluid" style="padding: 0;">
        <div class="header-bar d-flex justify-content-between">
            <div class="d-flex align-items-center gap-3 w-100">
                <button class="btn btn-sm btn-light d-md-none" id="sidebar-toggle" type="button">
                    <i class="ri-menu-line fs-5"></i>
                </button>
                <ol class="breadcrumb m-0 bg-transparent flex-grow-1">
                    <li class="breadcrumb-item"><a href="/" class="text-decoration-none">Accueil</a></li>
                    {% block breadcrumbs %}
                    <li class="breadcrumb-item active fw-medium">SaaS Admin</li>
                    {% endblock breadcrumbs %}
                </ol>
                <div class="d-flex align-items-center ms-auto">
                    <div class="dropdown">
                        <a href="/" class="btn btn-sm btn-soft-primary d-flex align-items-center gap-1 rounded-pill px-3">
                            <i class="ri-arrow-left-line fs-14"></i> Retour au portail
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</header>
